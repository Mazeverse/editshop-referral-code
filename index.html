<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 키워드 최적화 타이틀 -->
  <title>에딧샵 추천인 코드 M00124211 | A-dit shop 혜택 안내</title>
  <meta name="description" content="에딧샵 추천인 코드 M00124211 입력하고 특별한 혜택을 받으세요. A-dit shop 가입 시 필수 입력!" />
  <meta name="keywords" content="에딧샵 추천인 코드, 에딧샵 추천인, A-dit shop 추천인, M00124211" />
  
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="에딧샵 추천인 코드: M00124211" />
  <meta property="og:description" content="A-dit shop 가입 시 추천인 코드를 입력하고 혜택을 확인하세요." />
  <link rel="canonical" href="https://editshop-referral-code.vercel.app/" />

  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    :root {
      --primary-color: #ffffff;
      --accent-color: #ff3b30; /* 에딧샵 포인트 컬러 느낌의 레드 */
      --bg-dark: #0a0a0a;
      --card-bg: #1a1a1a;
      --text-main: #ffffff;
      --text-dim: #a0a0a0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Pretendard", -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* 배경 그라데이션 효과 */
    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 59, 48, 0.15) 0%, transparent 70%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid #333;
      border-radius: 28px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .brand-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent-color);
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .target-keyword {
      color: var(--text-dim);
      font-size: 15px;
      margin-bottom: 32px;
    }

    /* 코드 박스 */
    .code-wrapper {
      background: #252525;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px dashed #444;
      transition: all 0.3s ease;
    }

    .code-wrapper:hover {
      border-color: var(--accent-color);
    }

    .code-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .code-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary-color);
      letter-spacing: 1px;
    }

    /* 버튼 */
    .copy-btn {
      width: 100%;
      padding: 18px;
      background: var(--primary-color);
      color: #000;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      margin-bottom: 16px;
    }

    .copy-btn:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }

    .copy-btn:active {
      transform: translateY(0);
    }

    .link-btn {
      display: block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .link-btn:hover {
      color: var(--primary-color);
    }

    /* 토스트 메시지 */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent-color);
      color: white;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 20px rgba(255, 59, 48, 0.3);
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <main class="card">
      <span class="brand-tag">A-dit shop</span>
      <h1>에딧샵 추천인 코드</h1>
      <p class="target-keyword">가입 시 입력하고 혜택을 받으세요</p>

      <div class="code-wrapper">
        <p class="code-label">Referral Code</p>
        <div class="code-value" id="targetCode">M00124211</div>
      </div>

      <button class="copy-btn" onclick="copyCode()">코드 복사하기</button>
      
      <a href="https://www.a-ditshop.com/" target="_blank" rel="noopener noreferrer" class="link-btn">
        A-dit shop 공식몰 이동
      </a>
    </main>
  </div>

  <div id="toast">코드가 복사되었습니다!</div>

  <script>
    function copyCode() {
      const code = document.getElementById("targetCode").innerText;
      navigator.clipboard.writeText(code).then(() => {
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        
        setTimeout(() => {
          toast.classList.remove("show");
        }, 2000);
      });
    }
  </script>
</body>
</html>
