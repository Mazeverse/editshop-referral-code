  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    :root {
      --primary-color: #ffffff;
      --accent-color: #ff3b30;
      --bg-dark: #0a0a0a;
      --card-bg: #1a1a1a;
      --text-main: #ffffff;
      --text-dim: #a0a0a0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Pretendard", -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 59, 48, 0.12) 0%, transparent 70%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid #2a2a2a;
      border-radius: 32px;
      padding: 50px 24px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .brand-tag {
      display: inline-block;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--accent-color);
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.8px;
    }

    .target-keyword {
      color: var(--text-dim);
      font-size: 16px;
      margin-bottom: 40px;
    }

    .code-wrapper {
      background: #222222;
      border-radius: 24px;
      padding: 30px 20px;
      margin-bottom: 30px;
      border: 1px solid #333;
      position: relative;
      overflow: hidden;
    }

    .code-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .code-value {
      font-size: 34px;
      font-weight: 900;
      color: var(--primary-color);
      letter-spacing: 1.5px;
    }

    .copy-btn {
      width: 100%;
      padding: 20px;
      background: var(--primary-color);
      color: #000;
      border: none;
      border-radius: 20px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .copy-btn:hover {
      background: #f0f0f0;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
    }

    .copy-btn:active {
      transform: translateY(-1px);
    }

    .footer-note {
      margin-top: 24px;
      font-size: 13px;
      color: #555;
    }

    #toast {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--accent-color);
      color: white;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 15px 30px rgba(255, 59, 48, 0.4);
      z-index: 100;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <main class="card">
      <span class="brand-tag">A-dit shop</span>
      <h1>에딧샵 추천인 코드</h1>
      <p class="target-keyword">가입 시 입력하고 혜택을 받으세요</p>

      <div class="code-wrapper">
        <p class="code-label">Referral Code</p>
        <div class="code-value" id="targetCode">M00124211</div>
      </div>

      <button class="copy-btn" onclick="copyCode()">코드 복사하기</button>
      
      <p class="footer-note">A-dit shop Referral Guide</p>
    </main>
  </div>

  <div id="toast">코드가 복사되었습니다!</div>

  <script>
    function copyCode() {
      const code = document.getElementById("targetCode").innerText;
      navigator.clipboard.writeText(code).then(() => {
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        
        const btn = document.querySelector(".copy-btn");
        btn.innerText = "복사 완료!";
        btn.style.background = "#ff3b30";
        btn.style.color = "#fff";

        setTimeout(() => {
          toast.classList.remove("show");
          btn.innerText = "코드 복사하기";
          btn.style.background = "";
          btn.style.color = "";
        }, 2000);
      });
    }
  </script>
</body>
</html>
